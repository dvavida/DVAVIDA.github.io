<script src="posts.js?v=1"></script>

<script>
  const grid = document.getElementById("postsGrid");

  Object.keys(POSTS).forEach(id => {
    const post = POSTS[id];
    const thumb = post.images[0];

    const card = document.createElement("a");
    card.className = "post-card";
    card.href = `post.html?id=${id}`;

    card.innerHTML = `
      <div class="thumb">
        <img src="${thumb.src}" alt="${thumb.alt}">
      </div>

      <div class="meta">
        <h2>${post.title}</h2>
        <p>${post.caption.split("\n")[0]}</p>
      </div>

      <div class="seo-images">
        ${post.images.map(img => `<img src="${img.src}" alt="${img.alt}">`).join("")}
      </div>
    `;

    grid.appendChild(card);
  });
</script>
